<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Input SKT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container mt-5 mb-5 p-4 bg-white shadow rounded">
      <h3 class="mb-4 text-center">Form Input Surat Keterangan Terdaftar (SKT)</h3>
      <form id="sktForm" onsubmit="event.preventDefault(); submitData();">
        
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nomor SKT</label>
            <input type="text" class="form-control" name="nomorSKT" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Nama Organisasi</label>
            <input type="text" class="form-control" name="namaOrganisasi" required>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Tanggal Pengajuan</label>
            <input type="text" class="form-control" name="tanggalPengajuan" placeholder="Misal: 13 Maret 2024" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Tanggal Berdiri</label>
            <input type="text" class="form-control" name="tanggalBerdiri" placeholder="Misal: 7 Maret 2024" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Alamat Sekretariat</label>
          <textarea class="form-control" name="alamatSekretariat" rows="2" required></textarea>
        </div>

        <div class="row">
          <div class="col-md-3 mb-3">
            <label class="form-label">Kepengurusan / Periode</label>
            <input type="text" class="form-control" name="periode" placeholder="Misal: 2024 s/d 2029" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Nama Ketua</label>
            <input type="text" class="form-control" name="namaKetua" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Nama Sekretaris</label>
            <input type="text" class="form-control" name="namaSekretaris" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Nama Bendahara</label>
            <input type="text" class="form-control" name="namaBendahara" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Tanggal Penerbitan SKT</label>
          <input type="text" class="form-control" name="tanggalPenerbitan" placeholder="Misal: 7 Maret 2024" required>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="submitBtn">Simpan Data & Buat SKT</button>
      </form>
      
      <div id="message" class="mt-3"></div>
    </div>
    
    <script>
      function submitData() {
        var form = document.getElementById('sktForm');
        var btn = document.getElementById('submitBtn');
        var messageBox = document.getElementById('message');
        
        // 1. GANTI URL DI BAWAH INI DENGAN URL DARI GOOGLE APPS SCRIPT ANDA
        var scriptURL = 'https://script.google.com/macros/s/AKfycbxJ2ZcmUWN-sGAQhHy0sGsFp9vgC36OnmUpTVBk14kTHzWQM0AREWdJoCeJ5P8vt5ygYQ/exec';
        
        // Mengubah form menjadi format yang aman dari blokir server
        var formData = new FormData(form);
        
        messageBox.innerHTML = '<div class="alert alert-info">Sistem sedang memproses data ke Google Drive... Mohon tunggu.</div>';
        btn.disabled = true;

        fetch(scriptURL, {
          method: 'POST',
          body: formData
        })
        .then(response => response.json())
        .then(data => {
          if (data.result === 'success') {
            messageBox.innerHTML = '<div class="alert alert-success">' + data.message + '</div>';
            form.reset();
          } else {
            messageBox.innerHTML = '<div class="alert alert-danger">Terjadi Kesalahan: ' + data.message + '</div>';
          }
          btn.disabled = false;
        })
        .catch(error => {
          messageBox.innerHTML = '<div class="alert alert-danger">Koneksi gagal. Pastikan URL Web App sudah benar.</div>';
          btn.disabled = false;
        });
      }
    </script>
  </body>
</html>
